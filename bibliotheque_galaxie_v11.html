<script>
// HORLOGE
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock-time').textContent = `${h}:${m}:${s}`;
  const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  document.getElementById('clock-date').textContent = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}
updateClock(); setInterval(updateClock, 1000);

// MÉTÉO
async function loadWeather() {
  try {
    const geo = await fetch('https://ipapi.co/json/').then(r=>r.json());
    const lat = geo.latitude, lon = geo.longitude, city = geo.city;
    const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`).then(r=>r.json());
    const temp = Math.round(w.current_weather.temperature);
    const code = w.current_weather.weathercode;
    const icons = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'❄️',73:'❄️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};
    const icon = icons[code] || '🌡️';
    document.querySelector('#weather-widget .icon').textContent = icon;
    document.getElementById('weather-temp').textContent = `${temp}°C`;
    document.getElementById('weather-city').textContent = city || 'Ma position';
  } catch(e) {
    document.getElementById('weather-city').textContent = 'Météo indisponible';
  }
}
loadWeather();

const allItems = [];
cats.forEach(cat => {
  allItems.push({id:cat.id, name:cat.name, icon:cat.icon, color:cat.color, parent:null, parentName:null, link:cat.link});
  cat.children.forEach(sub => allItems.push({id:sub.id, name:sub.name, icon:sub.icon, color:cat.color, parent:cat.id, parentName:cat.name, link:sub.link}));
});

let W, H, cx, cy, activeId = null, searchQuery = '';
const area = document.getElementById('canvas-area');
const bgC = document.getElementById('bg'), lC = document.getElementById('lines');
const bctx = bgC.getContext('2d'), lctx = lC.getContext('2d');
const nodesEl = document.getElementById('nodes');
const pos = {};

function computePositions() {
  const R1 = Math.min(W,H)*0.24, R2 = Math.min(W,H)*0.62;
  cats.forEach(cat => {
    const rad = cat.angle*Math.PI/180;
    pos[cat.id] = {x: cx+Math.cos(rad)*R1, y: cy+Math.sin(rad)*R1};
    cat.children.forEach(sub => {
      const perpRad = (cat.angle+90)*Math.PI/180;
      pos[sub.id] = {x: cx+Math.cos(rad)*R2+Math.cos(perpRad)*sub.offset, y: cy+Math.sin(rad)*R2+Math.sin(perpRad)*sub.offset};
    });
  });
}

function resize() {
  W = area.clientWidth; H = area.clientHeight; cx = W/2; cy = H/2;
  bgC.width = lC.width = W; bgC.height = lC.height = H;
  computePositions(); drawGalaxy(); drawLines(); positionNodes(); positionOrb();
}

function seededRand(s){ let x=s; return ()=>{ x=Math.sin(x)*99999; return x-Math.floor(x); }; }

function drawGalaxy() {
  bctx.clearRect(0,0,W,H); bctx.fillStyle='#01000a'; bctx.fillRect(0,0,W,H);
  const bg=bctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H));
  bg.addColorStop(0,'rgba(16,8,50,0.98)'); bg.addColorStop(0.4,'rgba(6,3,22,0.95)'); bg.addColorStop(1,'rgba(0,0,4,1)');
  bctx.fillStyle=bg; bctx.fillRect(0,0,W,H);
  [{x:cx*0.25,y:cy*0.3,r:W*0.35,c:'rgba(70,15,190,0.14)'},{x:cx*1.8,y:cy*0.5,r:W*0.30,c:'rgba(12,70,155,0.12)'},{x:cx*0.5,y:cy*1.75,r:W*0.32,c:'rgba(90,15,130,0.12)'},{x:cx*1.65,y:cy*1.65,r:W*0.26,c:'rgba(15,115,90,0.09)'},{x:cx,y:cy,r:W*0.22,c:'rgba(50,25,150,0.14)'}].forEach(n=>{
    const g=bctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    g.addColorStop(0,n.c); g.addColorStop(1,'transparent');
    bctx.fillStyle=g; bctx.fillRect(0,0,W,H);
  });
  const rand=seededRand(99);
  for(let i=0;i<450;i++){ const x=rand()*W,y=rand()*H,r=rand()*1.2+0.15,a=rand()*0.6+0.15; bctx.beginPath(); bctx.arc(x,y,r,0,Math.PI*2); bctx.fillStyle=`rgba(255,255,255,${a})`; bctx.fill(); }
  for(let i=0;i<24;i++){ const x=rand()*W,y=rand()*H,r=rand()*1.6+0.7; bctx.beginPath(); bctx.arc(x,y,r,0,Math.PI*2); bctx.fillStyle='rgba(255,255,255,0.95)'; bctx.fill(); bctx.beginPath(); bctx.arc(x,y,r*4.5,0,Math.PI*2); bctx.fillStyle='rgba(255,255,255,0.025)'; bctx.fill(); }
}

function getMatchIds() {
  if (!searchQuery) return null;
  return new Set(allItems.filter(i=>i.name.toLowerCase().includes(searchQuery.toLowerCase())).map(i=>i.id));
}

function drawLines() {
  lctx.clearRect(0,0,W,H);
  const matchIds = getMatchIds();
  cats.forEach(cat => {
    const catMatch = !matchIds || matchIds.has(cat.id) || cat.children.some(s=>matchIds.has(s.id));
    const isActiveCat = activeId===cat.id || cat.children.some(s=>s.id===activeId);
    drawCurve({x:cx,y:cy}, pos[cat.id], cat.color, isActiveCat, catMatch?(isActiveCat?1.8:0.6):0.1);
    cat.children.forEach(sub => {
      const subMatch = !matchIds || matchIds.has(sub.id);
      const isActive = activeId===sub.id || activeId===cat.id;
      drawCurve(pos[cat.id], pos[sub.id], cat.color, isActive, subMatch?(isActive?1.2:0.45):0.1);
    });
  });
}

function drawCurve(from,to,color,active,lw){
  lctx.beginPath(); lctx.moveTo(from.x,from.y);
  const mx=(from.x+to.x)/2+(to.y-from.y)*0.15, my=(from.y+to.y)/2-(to.x-from.x)*0.15;
  lctx.quadraticCurveTo(mx,my,to.x,to.y);
  if(active){lctx.shadowColor=color;lctx.shadowBlur=12;lctx.strokeStyle=color;lctx.setLineDash([]);}
  else{lctx.shadowBlur=0;lctx.strokeStyle='rgba(255,255,255,0.09)';lctx.setLineDash([3,6]);}
  lctx.lineWidth=lw; lctx.stroke(); lctx.setLineDash([]); lctx.shadowBlur=0;
}

function positionNodes() {
  nodesEl.innerHTML='';
  const matchIds = getMatchIds();
  cats.forEach(cat => {
    const catMatch = !matchIds || matchIds.has(cat.id) || cat.children.some(s=>matchIds.has(s.id));
    createNode(cat, pos[cat.id], 54, 22, cat.glow, catMatch);
    cat.children.forEach(sub => createNode(sub, pos[sub.id], 42, 17, null, !matchIds||matchIds.has(sub.id)));
  });
}

function createNode(item, p, size, iconSize, glow, visible) {
  const el=document.createElement('div');
  el.className='node-label'+(visible===false?' dimmed':'');
  el.style.left=p.x+'px'; el.style.top=p.y+'px';
  const shadow=glow?`0 0 20px ${glow}, 0 0 6px ${glow}`:'none';
  el.innerHTML=`<div class="node-icon" style="width:${size}px;height:${size}px;font-size:${iconSize}px;background:${item.bg};border:0.5px solid ${item.border};box-shadow:${shadow};"><i class="ti ${item.icon}" style="color:${item.color}"></i></div><span class="node-text">${item.name}</span>`;
  el.addEventListener('mouseenter',()=>{activeId=item.id;drawLines();});
  el.addEventListener('mouseleave',()=>{activeId=null;drawLines();});
  el.addEventListener('click',()=>{ if(item.link) window.open(item.link,'_blank'); });
  nodesEl.appendChild(el);
}

function positionOrb() {
  let orb = document.getElementById('center-orb');
  if (!orb) { orb = document.createElement('div'); orb.id = 'center-orb'; orb.className = 'center-orb'; area.appendChild(orb); }
  orb.style.left = cx + 'px'; orb.style.top = cy + 'px';
  orb.innerHTML = `<div style="width:88px;height:88px;border-radius:50%;overflow:hidden;border:2px solid rgba(160,140,255,0.55);box-shadow:0 0 45px rgba(110,90,255,0.65),0 0 15px rgba(110,90,255,0.35);">
    <img src="https://i.pinimg.com/736x/a8/25/f3/a825f3568f19afa30c70add8a0e600d4.jpg" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />
  </div>`;
}

function buildTree(){
  const container=document.getElementById('tree');
  cats.forEach(cat=>{
    const section=document.createElement('div'); section.className='tree-section';
    const catEl=document.createElement('div'); catEl.className='tree-cat';
    catEl.innerHTML=`<i class="ti ${cat.icon}" style="color:${cat.color}"></i><span>${cat.name}</span>`;
    catEl.addEventListener('mouseenter',()=>{activeId=cat.id;drawLines();});
    catEl.addEventListener('mouseleave',()=>{activeId=null;drawLines();});
    if(cat.link) catEl.addEventListener('click',()=>window.open(cat.link,'_blank'));
    section.appendChild(catEl);
    cat.children.forEach(s=>{
      const subEl=document.createElement('div'); subEl.className='tree-sub';
      subEl.innerHTML=`<i class="ti ${s.icon}" style="color:${cat.color}"></i><span>${s.name}</span>`;
      subEl.addEventListener('mouseenter',()=>{activeId=s.id;drawLines();});
      subEl.addEventListener('mouseleave',()=>{activeId=null;drawLines();});
      if(s.link) subEl.addEventListener('click',()=>window.open(s.link,'_blank'));
      section.appendChild(subEl);
      if(s.children && s.children.length){
        s.children.forEach(ss=>{
          const ssEl=document.createElement('div'); ssEl.className='tree-subsub';
          ssEl.innerHTML=`<i class="ti ${ss.icon}" style="color:${cat.color}"></i><span style="color:rgba(255,255,255,0.5)">${ss.name}</span>`;
          if(ss.link) ssEl.addEventListener('click',()=>window.open(ss.link,'_blank'));
          section.appendChild(ssEl);
        });
      }
      if(s.files && s.files.length){
        s.files.forEach(f=>{
          const fileEl=document.createElement('div'); fileEl.className='tree-file';
          fileEl.innerHTML=`<i class="ti ${f.icon}" style="color:${cat.color}"></i><span style="color:${cat.color};opacity:0.8">${f.name}</span>`;
          if(f.link) fileEl.addEventListener('click',()=>window.open(f.link,'_blank'));
          section.appendChild(fileEl);
        });
      }
    });
    container.appendChild(section);
  });
}

const searchInput=document.getElementById('search-input'), searchResults=document.getElementById('search-results');
searchInput.addEventListener('input',()=>{
  searchQuery=searchInput.value.trim();
  if(!searchQuery){ searchResults.innerHTML=''; searchResults.classList.remove('visible'); positionNodes(); drawLines(); return; }
  const matches=allItems.filter(i=>i.name.toLowerCase().includes(searchQuery.toLowerCase()));
  searchResults.innerHTML='';
  if(!matches.length){ searchResults.innerHTML=`<div style="font-size:12px;color:rgba(255,255,255,0.3);padding:6px 10px;">Aucun résultat</div>`; }
  else { matches.forEach(m=>{ const div=document.createElement('div'); div.className='result-item'; div.innerHTML=`<i class="ti ${m.icon}" style="color:${m.color};font-size:15px;"></i><span>${m.name}</span>${m.parentName?`<span class="badge">${m.parentName}</span>`:''}`; div.addEventListener('click',()=>{ if(m.link) window.open(m.link,'_blank'); searchInput.value=''; searchQuery=''; searchResults.innerHTML=''; searchResults.classList.remove('visible'); positionNodes(); drawLines(); }); searchResults.appendChild(div); }); }
  searchResults.classList.add('visible'); positionNodes(); drawLines();
});

buildTree(); resize(); window.addEventListener('resize',resize);
</script>
